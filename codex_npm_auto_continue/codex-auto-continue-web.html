<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Codex Private Console</title>
    <link rel="stylesheet" href="/codex-auto-continue-web.css">
  </head>
  <body>
    <div class="backdrop"></div>
    <main class="shell">
      <header class="hero">
        <div>
          <p class="eyebrow">Private Remote Console</p>
          <h1>Codex 网页控制台</h1>
          <p class="subtitle">本地优先、密码保护、保留现有 chat / auto 语义。</p>
        </div>
        <div class="hero-actions" id="topBar">
          <span class="listen-url" id="listenUrl">--</span>
          <span class="binding-hint" id="bindingHint" hidden>--</span>
          <button id="logoutButton" class="ghost" type="button" hidden>退出登录</button>
        </div>
      </header>

      <section class="panel auth-panel" id="authPanel">
        <div class="panel-head">
          <h2>登录</h2>
          <p>输入配置密码和当前 Codex 启动时打印的 control key。</p>
        </div>
        <form id="loginForm" class="stack-form">
          <label>
            <span>密码</span>
            <input id="passwordInput" type="password" name="password" autocomplete="current-password" required>
          </label>
          <label>
            <span>Control Key</span>
            <input id="controlKeyInput" type="text" name="control_key" autocomplete="off" spellcheck="false" required>
          </label>
          <button type="submit">登录控制台</button>
        </form>
        <p class="error" id="loginError"></p>
      </section>

      <section class="console" id="consolePanel" hidden>
        <div class="grid status-grid">
          <article class="panel status-card">
            <div class="panel-head compact">
              <h2>运行状态</h2>
              <span class="pill" id="statusPill">--</span>
            </div>
            <dl class="stats">
              <div>
                <dt>当前模式</dt>
                <dd id="modeValue">--</dd>
              </div>
              <div>
                <dt>Chat 队列</dt>
                <dd id="chatQueueValue">0</dd>
              </div>
              <div>
                <dt>Auto 剩余总数</dt>
                <dd id="autoTotalValue">0</dd>
              </div>
              <div>
                <dt>当前任务剩余</dt>
                <dd id="currentTaskRemainingValue">--</dd>
              </div>
            </dl>
          </article>

          <article class="panel status-card wide">
            <div class="panel-head compact">
              <h2>当前任务</h2>
              <span class="minor" id="streamState">实时连接中</span>
            </div>
            <pre id="currentTaskMessage" class="message-block empty">暂无 auto 任务</pre>
          </article>
        </div>

        <div class="grid control-grid">
          <article class="panel control-card">
            <div class="panel-head compact">
              <h2>Chat 模式</h2>
              <span class="minor">messages 追加到 FIFO</span>
            </div>
            <form id="chatForm" class="stack-form">
              <label>
                <span>发送消息</span>
                <textarea id="chatMessageInput" rows="6" placeholder="例如：继续分析这个报错"></textarea>
              </label>
              <button type="submit">发送 chat 消息</button>
            </form>
          </article>

          <article class="panel control-card">
            <div class="panel-head compact">
              <h2>Auto 模式</h2>
              <span class="minor">tasks 会覆盖后续自动任务</span>
            </div>
            <form id="autoForm" class="stack-form">
              <label>
                <span>任务队列 JSON</span>
                <textarea id="autoTasksInput" rows="8">[{"message":"继续","count":5}]</textarea>
              </label>
              <div class="row-actions">
                <button type="submit">更新 auto 队列</button>
                <button id="stopAutoButton" type="button" class="danger">stop_auto</button>
              </div>
            </form>
          </article>
        </div>

        <div class="grid feed-grid">
          <article class="panel feed-card">
            <div class="panel-head compact">
              <h2>最新 Codex 回复</h2>
              <span class="minor">turn 完成后更新</span>
            </div>
            <pre id="latestReply" class="message-block empty">暂无回复</pre>
          </article>

          <article class="panel feed-card">
            <div class="panel-head compact">
              <h2>最近回执</h2>
              <span class="minor">控制回执与状态变化</span>
            </div>
            <div id="recentEvents" class="event-list empty-state">暂无事件</div>
          </article>
        </div>
      </section>
    </main>

    <script src="/codex-auto-continue-web.js"></script>
  </body>
</html>
